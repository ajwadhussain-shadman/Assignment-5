<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-05</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: "Geist", sans-serif;

        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">
    <!-- navbar -->
    <div class="navbar bg-[#FFFFFF] py-4 px-20 flex  justify-between w-full shadow-md sticky top-0 z-50 ">
        <div class="navbar-logo flex items-center gap-2 ">
            <img src="./assets/github-logo.png" alt="" class="w-9 h-9">
            <h1 class="font-semibold text-2xl text-[#1F2937]">GitHub Issues Tracker</h1>
        </div>
        <div class="navbar-search flex gap-2">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search issues..." />
            </label>

            <button class="btn btn-primary"><i class="fa-solid fa-plus "></i>New Issue</button>
        </div>
    </div>
    <!-- main-section -->
    <div class="main-section w-[70%] mx-auto pt-14">

        <!-- button section -->
        <div class="buttons bg-[#FFFFFF]  mx-auto flex gap-2 p-6 drop-shadow-xl rounded-lg">
            <button onclick="currentState(allBtn)" id="allBtn"
                class="btn btn-primary w-[120px] hover:bg-black hover:text-white ">All</button>
            <button onclick="currentState(openBtn)" id="openBtn"
                class="btn w-[120px] hover:bg-black hover:text-white">Open</button>
            <button onclick="currentState(closedBtn)" id="closedBtn"
                class="btn w-[120px] hover:bg-black hover:text-white">Closed</button>
        </div>

        <!-- issues section -->
        <div class="issues mt-4 p-6 bg-white  rounded-lg flex justify-between border-b border-[#E4E4E7]">
            <div class="right-side flex gap-4">
                <div class="issue-logo bg-[#ECE4FF] w-[50px] h-[50px] rounded-full flex justify-center items-center">
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="text-[#1F2937] font-semibold text-xl"><span id="issueNumber">50</span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="left-side flex gap-2">
                <div class="flex gap-2 items-center">
                    <img src="./assets/Ellipse 2.png" class="w-3 h-3" alt="">
                    <p>Open</p>
                </div>
                <div class="flex gap-2 items-center">
                    <img src="./assets/Ellipse 2 (1).png" class="w-3 h-3" alt="">
                    <p>Closed</p>
                </div>

            </div>
        </div>

        <!--cards section  -->
        <div id="issueCardSection" class="cards-container p-6 bg-[#FBFBFB] grid grid-cols-4 gap-3">
            <!-- card -->
           
    </div>

    </div>
    <script src="./script/login.js"></script>
    <script src="./script/tracker.js"></script>
</body>

</html>
